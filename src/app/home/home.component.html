<div class="home-page">

  <!-- Welcome Header -->
  <mat-card class="welcome-card">

    <div class="welcome-content">

      <div class="welcome-text">

        <h1>Welcome Back 👋</h1>

        <p>
          Here’s what’s happening with your project today.
          Monitor performance, manage settings, and explore features.
        </p>

        <button mat-raised-button color="primary">
          <mat-icon>dashboard</mat-icon>
          Go to Dashboard
        </button>

      </div>

      <div class="welcome-image">

        <img src="assets/business.jpg" alt="Welcome Image">

      </div>

    </div>

  </mat-card>


  <!-- Statistics Cards -->
  <div class="stats-container">

    <mat-card class="stat-card users">
      <mat-icon>group</mat-icon>
      <div>
        <h2>1,245</h2>
        <p>Total Users</p>
      </div>
    </mat-card>

    <mat-card class="stat-card sales">
      <mat-icon>shopping_cart</mat-icon>
      <div>
        <h2>530</h2>
        <p>Orders</p>
      </div>
    </mat-card>

    <mat-card class="stat-card revenue">
      <mat-icon>payments</mat-icon>
      <div>
        <h2>$12,540</h2>
        <p>Revenue</p>
      </div>
    </mat-card>

    <mat-card class="stat-card performance">
      <mat-icon>trending_up</mat-icon>
      <div>
        <h2>85%</h2>
        <p>Performance</p>
      </div>
    </mat-card>

  </div>

</div>
