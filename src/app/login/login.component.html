<div class="login-wrapper">

  <!-- Background Image -->
  <div class="background-image"></div>

  <!-- Login Card -->
  <mat-card class="login-card">

    <div class="login-header">
      <mat-icon class="login-icon">account_circle</mat-icon>
      <h2>Welcome Back</h2>
      <p>Please login to your account</p>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput placeholder="Enter your email">
      <mat-icon matSuffix>email</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Password</mat-label>
      <input matInput type="password" placeholder="Enter your password">
      <mat-icon matSuffix>lock</mat-icon>
    </mat-form-field>

    <mat-checkbox class="remember">Remember me</mat-checkbox>

    <button mat-raised-button color="primary"
            class="login-button"
            routerLink="/dashbord">
      Login
    </button>

    <div class="extra-links">
      <a href="#">Forgot Password?</a>
      <a href="#">Create Account</a>
    </div>

  </mat-card>

</div>
