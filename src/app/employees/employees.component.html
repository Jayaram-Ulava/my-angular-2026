<div class="container mt-5">

<h2 class="title text-center">Employee Management System</h2>

<div class="row mt-4">

<!-- ADD EMPLOYEE FORM -->

<div class="col-md-4">

<div class="card form-card">

<div class="card-header">
Add New Employee
</div>

<div class="card-body">

<label>Name</label>
<input class="form-control mb-3" [(ngModel)]="name">

<label>Company</label>
<input class="form-control mb-3" [(ngModel)]="company">

<label>Role</label>
<input class="form-control mb-3" [(ngModel)]="role">

<label>Experience</label>
<input type="number" class="form-control mb-3" [(ngModel)]="exp">

<label>Package (LPA)</label>
<input type="number" class="form-control mb-3" [(ngModel)]="package">

<button class="btn btn-add w-100" (click)="addEmployee()">
Add Employee
</button>

</div>

</div>

</div>


<!-- TABLE -->

<div class="col-md-8">

<div class="table-card">

<div class="table-header">

<input
class="form-control search"
placeholder="Search Employee"
[(ngModel)]="searchText"appCapital >

<div>

<button class="btn btn-low" (click)="lowPackage()">Low Package</button>

<button class="btn btn-high" (click)="highPackage()">High Package</button>

<button class="btn btn-total" (click)="calculateTotal()">Show Total</button>

</div>

</div>

<table class="table table-hover mt-3">

<thead>

<tr>
<th>#</th>
<th>Name</th>
<th>Company</th>
<th>Role</th>
<th>Exp</th>
<th>Package</th>
</tr>

</thead>

<tbody>

<tr *ngFor="let emp of filteredEmployees; let i=index">

<td>{{i+1}}</td>
<td class="emp-name">{{emp.name}}</td>
<td>{{emp.company}}</td>

<td>
<span class="badge role">
{{emp.role}}
</span>
</td>

<td>{{emp.exp}} yrs</td>

<td class="salary">
{{emp.package}} LPA
</td>

</tr>

</tbody>

</table>

<!-- TOTAL -->

<div *ngIf="showTotal" class="total-box">

Total Package : {{total}} LPA

</div>

</div>

</div>

</div>

</div>
