<div class="container mt-5">

  <h2 class="text-center mb-4 title">Employee Details</h2>

  <div class="table-responsive">
    <table class="table table-striped table-hover shadow employee-table">

      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Company</th>
          <th>Role</th>
          <th>Experience</th>
          <th>Package</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let emp of employees; let i = index">
          <td>{{i+1}}</td>
          <td>{{emp.name | role:emp.exp}}</td>
          <td>{{emp.company}}</td>
          <td>
            <span class="badge bg-primary">
              {{emp.role}}
            </span>
          </td>
          <td>{{emp.exp}} Years</td>
          <td class="package">{{emp.package}}</td>
        </tr>
      </tbody>

    </table>
  </div>

</div>
