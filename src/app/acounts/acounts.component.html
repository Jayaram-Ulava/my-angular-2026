<div class="container mt-5">

  <div class="accounts-wrapper">

    <h2 class="title text-center mb-4">
      Account Management
    </h2>

    <div class="table-responsive">

      <table class="table table-hover accounts-table">

        <thead>
          <tr>
            <th>#</th>
            <th>Profile</th>
            <th>Account Name</th>
            <th>Account Number</th>
            <th>City</th>
            <th>Available Balance</th>
          </tr>
        </thead>

        <tbody>

          <tr *ngFor="let acc of acounts; let i=index">

            <td>{{i+1}}</td>

            <td>
              <img
              [src]="acc.profie_picture || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'"
              class="profile-image">
            </td>

            <td class="account-name">
              {{acc.account_name || 'Not Available'}}
            </td>

            <td>
              {{acc.account_number || 'N/A'}}
            </td>

            <td>
              {{acc.city || 'N/A'}}
            </td>

            <td class="balance">
              ₹ {{acc.available_balance || 0}}
            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
